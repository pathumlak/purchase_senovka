{% extends 'base.html' %}
{% load static %}

{% block title %}Confirm Delete Category{% endblock %}

{% block content %}
<div class="container mx-auto mt-10">
    <h1 class="text-2xl font-bold mb-4">Confirm Deletion</h1>
    <p class="mb-4">Are you sure you want to delete the category "{{ category.name }}"?</p>
    <form method="POST">
        {% csrf_token %}
        <div class="flex space-x-4">
            <button type="submit" class="bg-red-500 text-white px-4 py-2 rounded">Delete</button>
            <a href="{% url 'category_list' %}" class="bg-gray-300 text-gray-700 px-4 py-2 rounded">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
